<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в панель — SubHub.store</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-page">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo">🏪</div>
                <h1>SubHub.store</h1>
                <p>Панель управления администратора</p>
            </div>

            <div class="login-error" id="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-username">Имя пользователя</label>
                    <input type="text" class="form-input" id="login-username" placeholder="Введите имя пользователя" autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Пароль</label>
                    <input type="password" class="form-input" id="login-password" placeholder="Введите пароль" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 8px;">
                    Войти
                </button>
            </form>

            <p style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted);">
                © 2026 SubHub.store — Панель администратора
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        if (getToken()) {
            window.location.href = '/admin/dashboard.html';
        }
        initLoginForm();
    </script>
</body>
</html>
